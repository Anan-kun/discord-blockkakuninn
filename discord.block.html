<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discordブロックユーザー確認ツール</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:420px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

.warning{
    background:#ffe8a1;
    border:2px solid #d9a400;
    padding:12px;
    border-radius:8px;
    margin-bottom:20px;
    font-weight:bold;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#result{
    display:none;
    margin-top:20px;
    padding:15px;
    border-radius:8px;
    background:#e9fbe9;
}

.fake{
    color:red;
    font-weight:bold;
    font-size:20px;
}

.note{
    margin-top:15px;
    color:#555;
    line-height:1.6;
}

.spinner{
    width:40px;
    height:40px;
    border:5px solid #ddd;
    border-top:5px solid #000;
    border-radius:50%;
    animation:spin .8s linear infinite;
    margin:20px auto;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

#loading{
    text-align:center;
}

</style>
</head>

<body>

<div class="card">

<div class="warning">
⚠ Discordブロックユーザー確認ツール<br>
</div>

<h2>Discord連携</h2>

<button id="demoButton" onclick="showDemo()">
Discord連携
</button>

<div id="loading" style="display:none;">
    <div class="spinner"></div>
    <p>読み込み中...</p>
</div>

<div id="result">
<div class="fake">✓ おまえはバカか</div>

<div class="note">
<strong>重要：</strong><br>

実際のDiscordのブロックユーザーリストを取得するものではありません。<br>

</div>

</div>

</div>

<script>
function showDemo(){

    document.getElementById("demoButton").disabled = true;

    document.getElementById("loading").style.display = "block";

    document.getElementById("result").style.display = "none";

    setTimeout(function(){

        document.getElementById("loading").style.display = "none";

        document.getElementById("result").style.display = "block";

        document.getElementById("demoButton").disabled = false;

    },2000);

}
</script>

</body>
</html>
